name: Deploy GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Configure Vite base path
        run: |
          repository_name="${GITHUB_REPOSITORY#*/}"

          if [ "$repository_name" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            vite_base_path="/"
          else
            vite_base_path="/${repository_name}/"
          fi

          echo "VITE_BASE_PATH=$vite_base_path" >> "$GITHUB_ENV"
          echo "Using VITE_BASE_PATH=$vite_base_path"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify Pages base path
        run: |
          if grep -Fq "/LocalBite/" dist/index.html; then
            echo "::error::dist/index.html still references /LocalBite/."
            exit 1
          fi

          if [ "$VITE_BASE_PATH" != "/" ] && ! grep -Fq "$VITE_BASE_PATH" dist/index.html; then
            echo "::error::dist/index.html does not reference expected base path $VITE_BASE_PATH."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
